name: Keep Backend Awake

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend
        run: |
          curl -f -m 10 https://portfolioo-backend.onrender.com/ || echo "Ping failed (service may be redeploying or sleeping)"
